<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root {
            --speed: 5s;
            --block-size: 60px;
            --gap: 10px;
            --travel: 60vw;
            --offset: calc(var(--block-size) + var(--gap));

            /* Dark theme (default) — deep navy + teal + white */
            --color-bg: #0f1923;
            --block-color: #2a9db5;
            --block-color-mid: #1a7a8a;
            --block-color-end: #c8e6ea;
        }

        @media (prefers-color-scheme: light) {
            :root {
                /* Light theme — warm cream + deep teal + gold */
                --color-bg: #f5f0e8;
                --block-color: #1a4a4a;
                --block-color-mid: #c8a96e;
                --block-color-end: #2d6b5e;
            }
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--color-bg);
            overflow: hidden;
        }

        .scene {
            position: relative;
            width: calc(var(--block-size) * 2 + var(--gap));
            height: calc(var(--block-size) * 2 + var(--gap));
        }

        .block {
            position: absolute;
            width: var(--block-size);
            height: var(--block-size);
            background: var(--block-color);
        }

        .tl { top: 0; left: 0; animation: from-left-exit-down var(--speed) infinite linear, colorshift var(--speed) infinite linear; }
        .tr { top: 0; left: var(--offset); animation: from-left-exit-up var(--speed) infinite linear, colorshift var(--speed) infinite linear; }
        .bl { top: var(--offset); left: 0; animation: from-right-exit-down var(--speed) infinite linear, colorshift var(--speed) infinite linear; }
        .br { top: var(--offset); left: var(--offset); animation: from-right-exit-up var(--speed) infinite linear, colorshift var(--speed) infinite linear; }

        @keyframes from-left-exit-down {
            0%          { transform: translateX(calc(var(--travel) * -1)); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
            35%, 60%    { transform: none; animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
            100%        { transform: translateY(var(--travel)); }
        }

        @keyframes from-left-exit-up {
            0%          { transform: translateX(calc(var(--travel) * -1)); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
            35%, 60%    { transform: none; animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
            100%        { transform: translateY(calc(var(--travel) * -1)); }
        }

        @keyframes from-right-exit-down {
            0%          { transform: translateX(var(--travel)); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
            35%, 60%    { transform: none; animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
            100%        { transform: translateY(var(--travel)); }
        }

        @keyframes from-right-exit-up {
            0%          { transform: translateX(var(--travel)); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
            35%, 60%    { transform: none; animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
            100%        { transform: translateY(calc(var(--travel) * -1)); }
        }

        @keyframes colorshift {
            0%   { background: var(--block-color); }
            50%  { background: var(--block-color-mid); }
            100% { background: var(--block-color-end); }
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid var(--block-color);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.3s, background 0.3s;
            z-index: 10;
        }

        .theme-toggle:hover {
            background: var(--block-color);
        }

        .theme-toggle:hover .icon-sun,
        .theme-toggle:hover .icon-moon {
            stroke: var(--color-bg);
        }

        .icon-sun, .icon-moon {
            position: absolute;
            width: 20px;
            height: 20px;
            stroke: var(--block-color);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            transition: opacity 0.3s, stroke 0.3s;
        }

        /* show sun in dark mode, moon in light mode */
        .icon-moon { opacity: 0; }

        [data-theme="light"] .icon-sun { opacity: 0; }
        [data-theme="light"] .icon-moon { opacity: 1; }
    </style>
</head>
<body>

    <button class="theme-toggle" aria-label="Toggle theme">
        <!-- Sun icon (shown in dark mode) -->
        <svg class="icon-sun" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="4"/>
            <line x1="12" y1="2"  x2="12" y2="5"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="2"  y1="12" x2="5"  y2="12"/>
            <line x1="19" y1="12" x2="22" y2="12"/>
            <line x1="4.22"  y1="4.22"  x2="6.34"  y2="6.34"/>
            <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
            <line x1="4.22"  y1="19.78" x2="6.34"  y2="17.66"/>
            <line x1="17.66" y1="6.34"  x2="19.78" y2="4.22"/>
        </svg>
        <!-- Moon icon (shown in light mode) -->
        <svg class="icon-moon" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <div class="scene">
        <div class="block tl"></div>
        <div class="block tr"></div>
        <div class="block bl"></div>
        <div class="block br"></div>
    </div>

    <script>
        const root = document.documentElement;
        const btn = document.querySelector('.theme-toggle');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');

        const darkVars = {
            '--color-bg': '#0f1923',
            '--block-color': '#2a9db5',
            '--block-color-mid': '#1a7a8a',
            '--block-color-end': '#c8e6ea',
        };
        const lightVars = {
            '--color-bg': '#f5f0e8',
            '--block-color': '#1a4a4a',
            '--block-color-mid': '#c8a96e',
            '--block-color-end': '#2d6b5e',
        };

        function applyTheme(theme) {
            const vars = theme === 'light' ? lightVars : darkVars;
            for (const [k, v] of Object.entries(vars)) root.style.setProperty(k, v);
            root.dataset.theme = theme;
        }

        let current = prefersDark.matches ? 'dark' : 'light';
        applyTheme(current);

        btn.addEventListener('click', () => {
            current = current === 'dark' ? 'light' : 'dark';
            applyTheme(current);
        });
    </script>

</body>
</html>
