<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root {
            --speed: 5s;
            --block-size: 60px;
            --gap: 10px;
            --travel: 60vw;
            --offset: calc(var(--block-size) + var(--gap));
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0a0a0a;
            overflow: hidden;
        }

        .scene {
            position: relative;
            width: calc(var(--block-size) * 2 + var(--gap));
            height: calc(var(--block-size) * 2 + var(--gap));
        }

        .block {
            position: absolute;
            width: var(--block-size);
            height: var(--block-size);
            background: #ffffff;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .tl { top: 0; left: 0; animation: from-left-exit-down var(--speed) infinite linear; }
        .tr { top: 0; left: var(--offset); animation: from-left-exit-up var(--speed) infinite linear; }
        .bl { top: var(--offset); left: 0; animation: from-right-exit-down var(--speed) infinite linear; }
        .br { top: var(--offset); left: var(--offset); animation: from-right-exit-up var(--speed) infinite linear; }

        @keyframes from-left-exit-down {
            0%          { transform: translateX(calc(var(--travel) * -1)); }
            35%, 60%    { transform: none; }
            100%        { transform: translateY(var(--travel)); }
        }

        @keyframes from-left-exit-up {
            0%          { transform: translateX(calc(var(--travel) * -1)); }
            35%, 60%    { transform: none; }
            100%        { transform: translateY(calc(var(--travel) * -1)); }
        }

        @keyframes from-right-exit-down {
            0%          { transform: translateX(var(--travel)); }
            35%, 60%    { transform: none; }
            100%        { transform: translateY(var(--travel)); }
        }

        @keyframes from-right-exit-up {
            0%          { transform: translateX(var(--travel)); }
            35%, 60%    { transform: none; }
            100%        { transform: translateY(calc(var(--travel) * -1)); }
        }
    </style>
</head>
<body>

    <div class="scene">
        <div class="block tl"></div>
        <div class="block tr"></div>
        <div class="block bl"></div>
        <div class="block br"></div>
    </div>

</body>
</html>
