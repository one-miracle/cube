<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cube</title>
    <link rel="stylesheet" href="cube.css">
</head>
<body>

    <!-- SVG sprite — inlined to avoid cross-origin <use> restrictions -->
    <svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="display:none" aria-hidden="true">
        <symbol id="icon-sun" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="4"/>
            <line x1="12" y1="2"  x2="12" y2="5"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="2"  y1="12" x2="5"  y2="12"/>
            <line x1="19" y1="12" x2="22" y2="12"/>
            <line x1="4.22"  y1="4.22"  x2="6.34"  y2="6.34"/>
            <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
            <line x1="4.22"  y1="19.78" x2="6.34"  y2="17.66"/>
            <line x1="17.66" y1="6.34"  x2="19.78" y2="4.22"/>
        </symbol>
        <symbol id="icon-moon" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </symbol>
    </svg>

    <button class="theme-toggle" aria-label="Toggle theme">
        <svg class="toggle-icon" viewBox="0 0 24 24">
            <use class="icon-sun"  href="#icon-sun"/>
            <use class="icon-moon" href="#icon-moon"/>
        </svg>
    </button>

    <div class="scene">
        <div class="block tl"></div>
        <div class="block tr"></div>
        <div class="block bl"></div>
        <div class="block br"></div>
    </div>

    <script src="cube.js"></script>

</body>
</html>
